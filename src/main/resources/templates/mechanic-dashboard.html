<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mechanic Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light text-dark">
<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">VSMS</a>
        <div class="navbar-nav">
            <a class="nav-link" href="/customer">Customer</a>
            <a class="nav-link" href="/advisor">Advisor</a>
            <a class="nav-link" href="/mechanic">Mechanic</a>
            <a class="nav-link" href="/billing">Billing</a>
            <a class="nav-link" href="/inventory">Inventory</a>
        </div>
    </div>
</nav>

<main class="container py-4">
    <div class="card shadow-sm bg-white">
        <div class="card-body">
            <h5 class="card-title">Assigned Service Tasks</h5>
            <div class="table-responsive">
                <table class="table table-bordered table-striped align-middle">
                    <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Job Card</th>
                        <th>Mechanic</th>
                        <th>Task</th>
                        <th>Status</th>
                        <th>Labor Cost</th>
                        <th>Action</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="task : ${tasks}">
                        <td th:text="${task.id}">1</td>
                        <td th:text="${task.jobCard != null ? task.jobCard.id : ''}">1</td>
                        <td th:text="${task.mechanic != null ? task.mechanic.fullName : ''}">Mechanic</td>
                        <td th:text="${task.taskName}">Inspection</td>
                        <td th:text="${task.status}">PENDING</td>
                        <td th:text="${task.laborCost}">0.00</td>
                        <td>
                            <form th:if="${task.status != T(com.vsms.mechanic.entity.ServiceTaskStatus).COMPLETED}"
                                  th:action="@{|/mechanic/task/${task.id}/complete|}" method="post">
                                <button type="submit" class="btn btn-sm btn-success">Mark Completed</button>
                            </form>
                            <span th:if="${task.status == T(com.vsms.mechanic.entity.ServiceTaskStatus).COMPLETED}"
                                  class="badge bg-success">Completed</span>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(tasks)}">
                        <td colspan="7" class="text-center">No service tasks assigned.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>
</body>
</html>
