<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Advisor Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light text-dark">
<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">VSMS</a>
        <div class="navbar-nav">
            <a class="nav-link" href="/customer">Customer</a>
            <a class="nav-link" href="/advisor">Advisor</a>
            <a class="nav-link" href="/mechanic">Mechanic</a>
            <a class="nav-link" href="/billing">Billing</a>
            <a class="nav-link" href="/inventory">Inventory</a>
        </div>
    </div>
</nav>

<main class="container py-4">
    <div class="card shadow-sm bg-white mb-4">
        <div class="card-body">
            <h5 class="card-title">Job Cards</h5>
            <div class="table-responsive">
                <table class="table table-bordered table-striped align-middle">
                    <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Customer</th>
                        <th>Status</th>
                        <th>Labor Estimate</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="job : ${jobCards}">
                        <td th:text="${job.id}">1</td>
                        <td th:text="${job.customer != null ? job.customer.fullName : ''}">Customer</td>
                        <td th:text="${job.status}">CREATED</td>
                        <td th:text="${job.laborCostEstimate}">0.00</td>
                        <td>
                            <div class="d-flex gap-2">
                                <form th:action="@{|/advisor/job/${job.id}/start|}" method="post">
                                    <button type="submit" class="btn btn-sm btn-primary">Start</button>
                                </form>
                                <form th:action="@{|/advisor/job/${job.id}/qa|}" method="post">
                                    <button type="submit" class="btn btn-sm btn-warning">Request QA</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(jobCards)}">
                        <td colspan="5" class="text-center">No job cards available.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="card shadow-sm bg-white">
        <div class="card-body">
            <h5 class="card-title">Pending Appointments</h5>
            <div class="table-responsive">
                <table class="table table-bordered table-striped align-middle">
                    <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Customer</th>
                        <th>Vehicle</th>
                        <th>Type</th>
                        <th>Status</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="appt : ${appointments}">
                        <td th:text="${appt.id}">1</td>
                        <td th:text="${appt.customer != null ? appt.customer.fullName : ''}">Customer</td>
                        <td th:text="${appt.customer != null ? appt.customer.vehicleNumber : ''}">TN00AB0000</td>
                        <td th:text="${appt.appointmentType}">GENERAL</td>
                        <td th:text="${appt.status}">REQUESTED</td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(appointments)}">
                        <td colspan="5" class="text-center">No pending appointments.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>
</body>
</html>
