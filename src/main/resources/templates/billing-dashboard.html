<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Billing Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light text-dark">
<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">VSMS</a>
        <div class="navbar-nav">
            <a class="nav-link" href="/customer">Customer</a>
            <a class="nav-link" href="/advisor">Advisor</a>
            <a class="nav-link" href="/mechanic">Mechanic</a>
            <a class="nav-link" href="/billing">Billing</a>
            <a class="nav-link" href="/inventory">Inventory</a>
        </div>
    </div>
</nav>

<main class="container py-4">
    <div class="card shadow-sm bg-white mb-4">
        <div class="card-body">
            <h5 class="card-title">Generate Invoice</h5>
            <div class="table-responsive">
                <table class="table table-bordered table-striped align-middle">
                    <thead class="table-light">
                    <tr>
                        <th>Job ID</th>
                        <th>Customer</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="job : ${jobCards}">
                        <td th:text="${job.id}">1</td>
                        <td th:text="${job.customer != null ? job.customer.fullName : ''}">Customer</td>
                        <td th:text="${job.status}">READY_FOR_BILLING</td>
                        <td>
                            <form th:action="@{|/billing/generate/${job.id}|}" method="post" class="d-flex gap-2">
                                <input type="number" step="0.01" min="0" name="taxRate" class="form-control form-control-sm"
                                       placeholder="Tax (e.g. 0.18)">
                                <button type="submit" class="btn btn-sm btn-primary">Generate</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(jobCards)}">
                        <td colspan="4" class="text-center">No job cards ready for billing.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="card shadow-sm bg-white">
        <div class="card-body">
            <h5 class="card-title">Invoices</h5>
            <div class="table-responsive">
                <table class="table table-bordered table-striped align-middle">
                    <thead class="table-light">
                    <tr>
                        <th>Invoice ID</th>
                        <th>Job ID</th>
                        <th>Labor</th>
                        <th>Parts</th>
                        <th>Tax</th>
                        <th>Grand Total</th>
                        <th>Status</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="invoice : ${invoices}">
                        <td th:text="${invoice.id}">1</td>
                        <td th:text="${invoice.jobCard != null ? invoice.jobCard.id : ''}">1</td>
                        <td th:text="${invoice.laborTotal}">0.00</td>
                        <td th:text="${invoice.partsTotal}">0.00</td>
                        <td th:text="${invoice.taxAmount}">0.00</td>
                        <td th:text="${invoice.grandTotal}">0.00</td>
                        <td th:text="${invoice.status}">ISSUED</td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(invoices)}">
                        <td colspan="7" class="text-center">No invoices generated yet.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>
</body>
</html>
