<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Inventory Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light text-dark">
<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">VSMS</a>
        <div class="navbar-nav">
            <a class="nav-link" href="/customer">Customer</a>
            <a class="nav-link" href="/advisor">Advisor</a>
            <a class="nav-link" href="/mechanic">Mechanic</a>
            <a class="nav-link" href="/billing">Billing</a>
            <a class="nav-link" href="/inventory">Inventory</a>
        </div>
    </div>
</nav>

<main class="container py-4">
    <div class="card shadow-sm bg-white mb-4">
        <div class="card-body">
            <h5 class="card-title">Spare Parts</h5>
            <div class="table-responsive">
                <table class="table table-bordered table-striped align-middle">
                    <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Part Code</th>
                        <th>Part Name</th>
                        <th>Stock</th>
                        <th>Reorder Level</th>
                        <th>Unit Cost</th>
                        <th>Order</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="part : ${spareParts}">
                        <td th:text="${part.id}">1</td>
                        <td th:text="${part.partCode}">SP-001</td>
                        <td th:text="${part.partName}">Brake Pad</td>
                        <td th:text="${part.quantityInStock}">0</td>
                        <td th:text="${part.reorderLevel}">0</td>
                        <td th:text="${part.unitCost}">0.00</td>
                        <td>
                            <form th:action="@{/inventory/order}" method="post" class="row g-2">
                                <input type="hidden" name="sparePartId" th:value="${part.id}">
                                <div class="col-12">
                                    <input type="number" min="1" name="quantity" class="form-control form-control-sm" placeholder="Qty" required>
                                </div>
                                <div class="col-12">
                                    <select name="strategyKey" class="form-select form-select-sm">
                                        <option value="CHEAPEST">Cheapest Vendor</option>
                                        <option value="FASTEST">Fastest Vendor</option>
                                    </select>
                                </div>
                                <div class="col-12">
                                    <button type="submit" class="btn btn-sm btn-primary w-100">Create Order</button>
                                </div>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(spareParts)}">
                        <td colspan="7" class="text-center">No spare parts found.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="card shadow-sm bg-white">
        <div class="card-body">
            <h5 class="card-title">Low Stock Alerts</h5>
            <ul class="list-group">
                <li class="list-group-item" th:each="part : ${lowStockSpareParts}"
                    th:text="${part.partName + ' (Stock: ' + part.quantityInStock + ')'}">Part Name</li>
                <li class="list-group-item text-center" th:if="${#lists.isEmpty(lowStockSpareParts)}">No low stock items.</li>
            </ul>
        </div>
    </div>
</main>
</body>
</html>
