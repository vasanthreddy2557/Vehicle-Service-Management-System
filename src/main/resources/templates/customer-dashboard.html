<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Customer Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light text-dark">
<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">VSMS</a>
        <div class="navbar-nav">
            <a class="nav-link" href="/customer">Customer</a>
            <a class="nav-link" href="/advisor">Advisor</a>
            <a class="nav-link" href="/mechanic">Mechanic</a>
            <a class="nav-link" href="/billing">Billing</a>
            <a class="nav-link" href="/inventory">Inventory</a>
        </div>
    </div>
</nav>

<main class="container py-4">
    <div class="row g-4">
        <div class="col-lg-4">
            <div class="card shadow-sm bg-white">
                <div class="card-body">
                    <h5 class="card-title">Book Appointment</h5>
                    <div th:if="${bookingError}" class="alert alert-danger" th:text="${bookingError}"></div>
                    <form th:action="@{/customer/book}" method="post" class="row g-3">
                        <div class="col-12">
                            <label class="form-label" for="vehicleLicensePlate">Vehicle License Plate</label>
                            <input id="vehicleLicensePlate" name="vehicleLicensePlate" class="form-control" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label" for="serviceType">Service Type</label>
                            <select id="serviceType" name="serviceType" class="form-select" required>
                                <option value="GENERAL">General</option>
                                <option value="EMERGENCY">Emergency</option>
                            </select>
                        </div>
                        <div class="col-12">
                            <button type="submit" class="btn btn-primary w-100">Book Service</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-lg-8">
            <div class="card shadow-sm bg-white">
                <div class="card-body">
                    <h5 class="card-title">Appointments</h5>
                    <div class="table-responsive">
                        <table class="table table-bordered table-striped align-middle">
                            <thead class="table-light">
                            <tr>
                                <th>ID</th>
                                <th>Customer</th>
                                <th>Vehicle</th>
                                <th>Type</th>
                                <th>Status</th>
                                <th>Date Time</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="appt : ${appointments}">
                                <td th:text="${appt.id}">1</td>
                                <td th:text="${appt.customer != null ? appt.customer.fullName : ''}">Name</td>
                                <td th:text="${appt.customer != null ? appt.customer.vehicleNumber : ''}">TN00AB0000</td>
                                <td th:text="${appt.appointmentType}">GENERAL</td>
                                <td th:text="${appt.status}">REQUESTED</td>
                                <td th:text="${appt.appointmentDateTime}">2026-04-11T10:00</td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(appointments)}">
                                <td colspan="6" class="text-center">No appointments yet.</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
